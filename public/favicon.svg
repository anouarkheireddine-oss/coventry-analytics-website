<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c9c8"/>
      <stop offset="100%" stop-color="#007a8a"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4b4"/>
      <stop offset="100%" stop-color="#006677"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="#0d1b2e"/>

  <!-- C shape — left arc -->
  <path d="
    M 210 130
    C 130 130, 80 175, 80 250
    C 80 325, 130 370, 210 370
    L 210 320
    C 158 320, 132 292, 132 250
    C 132 208, 158 180, 210 180
    Z
  " fill="url(#teal)"/>

  <!-- C inner cutout — creates the C opening -->
  <path d="
    M 195 200
    C 165 210, 155 228, 155 250
    C 155 272, 165 290, 195 300
    L 245 300
    L 245 260
    L 210 260
    C 200 255, 196 252, 196 250
    C 196 248, 200 245, 210 240
    L 245 240
    L 245 200
    Z
  " fill="#0d1b2e"/>

  <!-- A shape — right side -->
  <path d="
    M 290 130
    L 240 370
    L 290 370
    L 310 290
    L 380 290
    L 400 370
    L 450 370
    L 400 130
    Z
    M 325 160 L 370 260 L 320 260 Z
  " fill="url(#teal2)"/>

  <!-- Wave underline -->
  <path d="
    M 90 400
    Q 160 375, 250 390
    Q 340 405, 410 385
  " stroke="url(#teal)" stroke-width="14" fill="none" stroke-linecap="round"/>
</svg>
